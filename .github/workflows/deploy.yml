name: Build and Deploy to Docker Hub & AWS ECR/ECS

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
  DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}
  AWS_REGION: eu-north-1
  ECS_CLUSTER_NAME: lohit_cluster
  ECS_SERVICE_NAME: api-service
  ECS_TASK_DEFINITION: app-task

jobs:
  # Job 1: Test & Lint
  test:
    runs-on: ubuntu-latest
    name: Test & Lint Code
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run Unit Tests
      run: |
        python -m pytest test_api_project.py -v --tb=short
    
    - name: Run Flake8 Linting
      run: |
        python -m flake8 api_project.py test_api_project.py --max-line-length=100 --statistics
    
    - name: Test Coverage
      run: |
        pytest --cov=api_project test_api_project.py --cov-report=xml
    
    - name: Upload Coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        fail_ci_if_error: false

  # Job 2: Build & Push to Docker Hub
  push-docker-hub:
    needs: test
    runs-on: ubuntu-latest
    name: Build & Push to Docker Hub
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}
    
    - name: Build and Push to Docker Hub
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_HUB_USERNAME }}/app-api:latest
          ${{ secrets.DOCKER_HUB_USERNAME }}/app-api:${{ github.sha }}
        cache-from: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/app-api:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/app-api:buildcache,mode=max
    
    - name: Docker Hub Description
      uses: peter-evans/dockerhub-description@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}
        repository: ${{ secrets.DOCKER_HUB_USERNAME }}/app-api
        short-description: Flask User API with AWS RDS & Health Check
        readme-filepath: ./README.md

  # Job 3: Build & Push to AWS ECR
  push-aws-ecr:
    needs: test
    runs-on: ubuntu-latest
    name: Build & Push to AWS ECR
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
    
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1
    
    - name: Build, Tag, and Push Image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: janani/myapp
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
    
    - name: Output ECR Image URL
      run: echo "Image pushed to ${{ steps.login-ecr.outputs.registry }}/app-api:${{ github.sha }}"

  # Job 4: Deploy to AWS ECS
  deploy-ecs:
    needs: push-aws-ecr
    runs-on: ubuntu-latest
    name: Deploy to AWS ECS
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
    
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1
    
    - name: Download ECS Task Definition
      run: |
        aws ecs describe-task-definition --task-definition ${{ env.ECS_TASK_DEFINITION }} --region ${{ env.AWS_REGION }} --query taskDefinition > task-definition.json
    
    - name: Update ECS Task Definition with New Image
      id: task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: task-definition.json
        container-name: app
        image: ${{ steps.login-ecr.outputs.registry }}/app-api:${{ github.sha }}
    
    - name: Deploy to ECS Service
      uses: aws-actions/amazon-ecs-deploy-task-definition@v1
      with:
        task-definition: ${{ steps.task-def.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE_NAME }}
        cluster: ${{ env.ECS_CLUSTER_NAME }}
        wait-for-service-stability: true
    
    - name: Deployment Success
      run: echo "✅ Deployment to ECS completed successfully!"

  # Job 5: Send Notifications
  notify:
    needs: [test, push-docker-hub, push-aws-ecr, deploy-ecs]
    runs-on: ubuntu-latest
    name: Send Notifications
    if: always()
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
    
    - name: Deployment Status
      run: |
        echo "Pipeline Status Summary:"
        echo "========================"
        echo "Test: ${{ needs.test.result }}"
        echo "Docker Hub Push: ${{ needs.push-docker-hub.result }}"
        echo "ECR Push: ${{ needs.push-aws-ecr.result }}"
        echo "ECS Deploy: ${{ needs.deploy-ecs.result }}"
    
    - name: Send Success Notification (Optional - Slack)
      if: success()
      uses: slackapi/slack-github-action@v1.24.0
      with:
        webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
        payload: |
          {
            "text": "✅ Deployment Successful!",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Deployment Successful* ✅\n*Commit:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n*Author:* ${{ github.actor }}\n*Branch:* ${{ github.ref }}"
                }
              }
            ]
          }
      continue-on-error: true
    
    - name: Send Failure Notification (Optional - Slack)
      if: failure()
      uses: slackapi/slack-github-action@v1.24.0
      with:
        webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
        payload: |
          {
            "text": "❌ Deployment Failed!",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Deployment Failed* ❌\n*Commit:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n*Author:* ${{ github.actor }}\n*Branch:* ${{ github.ref }}"
                }
              }
            ]
          }
      continue-on-error: true
